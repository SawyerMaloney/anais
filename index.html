<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Anaïs</title>
<style>
  /* --s capped by viewport height so the word always fits vertically */
  :root {
    --s: min(clamp(70px, 16vw, 200px), 24vh);
    --d: clamp(12px, 2.2vw, 26px);   /* box depth (thin slab) */
    --bw: 60vw;                       /* measured by JS */
    --bh: var(--s);                   /* measured by JS */
    --gap: calc(var(--s) * 0.08);     /* spacing in the name cross */
    --zs: 0.4;                        /* zoom scale for the cross (sized by JS to fit) */
  }
  html, body { height: 100%; margin: 0; }
  body {
    background: #f3f0e8; /* eggshell */
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
    font-family: "Helvetica Neue", "Arial Black", Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  /* 3D box that rotates about the horizontal (X) axis */
  .scene { perspective: 1600px; perspective-origin: 50% 50%; }
  .flipper {
    position: relative;
    width: var(--bw);
    height: var(--bh);
    transform-style: preserve-3d;
  }
  .flipper.flip {
    animation: flipx 3.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
  }
  @keyframes flipx {
    0%   { transform: rotateX(0deg); }
    45%  { transform: rotateX(180deg); }
    55%  { transform: rotateX(180deg); }
    100% { transform: rotateX(360deg); }
  }

  /* Box faces: centered in the box, then translated/rotated into place.
     Scoped to .boxface so they don't affect the per-letter .face elements. */
  .boxface {
    position: absolute;
    top: 50%; left: 50%;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
  }
  .boxface.front {
    width: var(--bw); height: var(--bh);
    margin: calc(var(--bh) / -2) 0 0 calc(var(--bw) / -2);
    transform: translateZ(calc(var(--d) / 2));
    display: flex; align-items: center; justify-content: center;
    /* flat: the whole face composites as one plane so it hides cleanly
       (backface-visibility) when the box flips, instead of the letter
       faces bleeding through. The per-letter flip still has 3D depth via
       .word's perspective + .card's preserve-3d. */
  }
  .boxface.back {
    width: var(--bw); height: var(--bh);
    margin: calc(var(--bh) / -2) 0 0 calc(var(--bw) / -2);
    transform: rotateX(180deg) translateZ(calc(var(--d) / 2));
    display: flex; align-items: center; justify-content: center;
    font-size: clamp(34px, 8.5vw, 104px);
    font-weight: 900;
    color: #111;
    white-space: nowrap;
  }
  .word {
    display: flex;
    gap: 0.02em;
    perspective: 1200px;
    user-select: none;
    transition: opacity 0.25s;
  }

  /* Stable, non-rotating hit box. Sizes to the card it wraps.
     Carries the :hover so the flip target never changes mid-rotation. */
  .tile {
    position: relative;
    display: inline-flex;
  }

  .card {
    position: relative;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    height: 1.12em;
    font-size: var(--s);
    font-weight: 900;
    line-height: 1;
    color: #111;
    transform-style: preserve-3d;
    transition: transform 0.7s cubic-bezier(0.2, 0.8, 0.2, 1);
  }
  .tile:hover .card { transform: rotateY(180deg); }

  /* Per-letter faces (original layout — NOT absolutely centered).
     Prefixed .l-front/.l-back so they don't collide with the box's
     .boxface.front / .boxface.back faces. */
  .face {
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
  }
  .l-front {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    height: 1.12em;
  }
  .l-back {
    position: absolute;
    inset: 0;
    transform: rotateY(180deg);
    overflow: hidden;
  }
  .l-back img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .love-btn {
    position: fixed;
    top: 20px; right: 20px;
    z-index: 200;
    font: 600 18px/1 "Helvetica Neue", Arial, sans-serif;
    color: #111;
    background: #f3f0e8;
    border: 1.5px solid #111;
    border-radius: 999px;
    padding: 10px 16px;
    cursor: pointer;
    transition: background 0.2s, color 0.2s, transform 0.15s;
  }
  .love-btn:hover { background: #111; color: #f3f0e8; }
  .love-btn:active { transform: scale(0.94); }

  .jump-btn {
    position: fixed;
    top: 20px; left: 20px;
    z-index: 200;
    font: 600 18px/1 "Helvetica Neue", Arial, sans-serif;
    color: #111;
    background: #f3f0e8;
    border: 1.5px solid #111;
    border-radius: 999px;
    padding: 10px 16px;
    cursor: pointer;
    transition: background 0.2s, color 0.2s, transform 0.15s;
  }
  .jump-btn:hover { background: #111; color: #f3f0e8; }
  .jump-btn:active { transform: scale(0.94); }

  /* One-by-one bounce: each letter leaps, decaying until it settles. */
  @keyframes jump {
    0%   { transform: translateY(0);      animation-timing-function: ease-out; }
    12%  { transform: translateY(-110%);  animation-timing-function: ease-in;  }
    24%  { transform: translateY(0);      animation-timing-function: ease-out; }
    36%  { transform: translateY(-60%);   animation-timing-function: ease-in;  }
    46%  { transform: translateY(0);      animation-timing-function: ease-out; }
    56%  { transform: translateY(-34%);   animation-timing-function: ease-in;  }
    64%  { transform: translateY(0);      animation-timing-function: ease-out; }
    72%  { transform: translateY(-19%);   animation-timing-function: ease-in;  }
    78%  { transform: translateY(0);      animation-timing-function: ease-out; }
    85%  { transform: translateY(-10%);   animation-timing-function: ease-in;  }
    90%  { transform: translateY(0);      animation-timing-function: ease-out; }
    100% { transform: translateY(0); }
  }
  .word.jump .tile { animation: jump 1s both; will-change: transform; }
  .word.jump .tile:nth-child(1) { animation-delay: 0s; }
  .word.jump .tile:nth-child(2) { animation-delay: 0.1s; }
  .word.jump .tile:nth-child(3) { animation-delay: 0.2s; }
  .word.jump .tile:nth-child(4) { animation-delay: 0.3s; }
  .word.jump .tile:nth-child(5) { animation-delay: 0.4s; }

  /* ---- Name cross animation ---- */
  .names-btn {
    position: fixed;
    bottom: 20px; left: 50%;
    transform: translateX(-50%);
    z-index: 200;
    font: 600 14px/1 "Helvetica Neue", Arial, sans-serif;
    color: #111;
    background: #f3f0e8;
    border: 1.5px solid #111;
    border-radius: 999px;
    padding: 10px 16px;
    cursor: pointer;
    transition: background 0.2s, color 0.2s, transform 0.15s;
  }
  .names-btn:hover { background: #111; color: #f3f0e8; }
  .names-btn:active { transform: translateX(-50%) scale(0.94); }

  .anim-overlay {
    position: fixed; inset: 0; z-index: 150;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none;
    opacity: 0; transition: opacity 0.25s;
  }
  .anim-overlay.active { opacity: 1; }
  .anim-stage { position: relative; width: 0; height: 0; }
  .anim-stage > * {
    position: absolute; left: 0; top: 0;
    white-space: nowrap; font-weight: 900; color: #111;
  }

  /* ANAÏS: starts centered at full size (matching the real word), then
     zooms out to the left of the shared D. Scaling uses a right-side
     transform-origin so it shrinks toward the D. */
  .anim-anais-wrap {
    transform: translate(-50%, -50%);
    transition: transform 1s cubic-bezier(0.2, 0.8, 0.2, 1);
  }
  .anim-anais {
    display: inline-block;
    font-size: var(--s);
    transform: scale(1);
    transform-origin: right center;
    transition: transform 1s cubic-bezier(0.2, 0.8, 0.2, 1);
  }

  /* Cross arms around the shared D at center. --dw/--dh/--anais-w set by JS. */
  .anim-d      { font-size: calc(var(--s) * var(--zs)); line-height: 1; transform: translate(-50%, -50%); opacity: 0; transition: opacity 0.5s; }
  .anim-colin  { font-size: calc(var(--s) * var(--zs)); line-height: 1; transform: translate(calc(var(--dw) / 2 + var(--gap)), -50%); opacity: 0; transition: opacity 0.5s; }
  /* Vertical letters stack around the shared D: --k is the line index
     (R=-1 just above D, S=-6 at top; M=+1 just below D, Y=+7 at bottom). */
  .v-letter    { font-size: calc(var(--s) * var(--zs)); line-height: 1; transform: translate(-50%, calc(var(--k) * var(--dh) - 50%)); opacity: 0; transition: opacity 0.4s; transition-delay: var(--d, 0s); }
  .anim-heart  { font-size: calc(var(--s) * var(--zs)); line-height: 1; transform: translate(-50%, -50%) scale(1); opacity: 0; transition: opacity 0.4s; }

  /* Phases are cumulative; later rules win by source order. */
  .p1 .anim-anais-wrap { transform: translate(calc(-50% - var(--anais-w) / 2 - var(--gap) - var(--dw) / 2), -50%); }
  .p1 .anim-anais      { transform: scale(var(--zs)); }
  .p1 .anim-d, .p1 .anim-colin { opacity: 1; }

  .p2 .v-letter { opacity: 1; }

  .p3 .anim-d     { opacity: 0; }
  .p3 .anim-heart { opacity: 1; }

  .p4 .anim-anais-wrap { transform: translate(-50%, -50%); }
  .p4 .anim-anais      { transform: scale(1); }
  .p4 .anim-heart, .p4 .anim-colin, .p4 .v-letter { opacity: 0; }
  .p4 .v-letter { transition-delay: 0s; }

  @keyframes pulse {
    from { transform: translate(-50%, -50%) scale(1); }
    to   { transform: translate(-50%, -50%) scale(1.4); }
  }
  .anim-heart.pulse { animation: pulse 0.5s ease-in-out infinite alternate; }
</style>
</head>
<body>
  <button class="love-btn" id="loveBtn" title="Flip">♥</button>
  <button class="jump-btn" id="jumpBtn" title="Make them jump">💓</button>
  <div class="scene">
    <div class="flipper" id="flipper">
      <div class="boxface front">
        <div class="word">
          <div class="tile"><div class="card"><div class="face l-front">A</div><div class="face l-back"><img src="assets/images/a0386b7b-b1ea-49ac-8f8c-810d2b04c556.jpg" alt=""></div></div></div>
          <div class="tile"><div class="card"><div class="face l-front">N</div><div class="face l-back"><img src="assets/images/IMG_0772.jpg" alt=""></div></div></div>
          <div class="tile"><div class="card"><div class="face l-front">A</div><div class="face l-back"><img src="assets/images/IMG_1003.png" alt=""></div></div></div>
          <div class="tile"><div class="card"><div class="face l-front">Ï</div><div class="face l-back"><img src="assets/images/IMG_5316.jpg" alt=""></div></div></div>
          <div class="tile"><div class="card"><div class="face l-front">S</div><div class="face l-back"><img src="assets/images/IMG_6110.jpg" alt=""></div></div></div>
        </div>
      </div>
      <div class="boxface back">I love you</div>
    </div>
  </div>
  <button class="names-btn" id="namesBtn" title="Play name animation">❤</button>
  <div class="anim-overlay" id="animOverlay">
    <div class="anim-stage" id="animStage">
      <div class="anim-anais-wrap"><span class="anim-anais">ANAÏS</span></div>
      <div class="v-letter" style="--k:-6;--d:0.36s">S</div>
      <div class="v-letter" style="--k:-5;--d:0.30s">A</div>
      <div class="v-letter" style="--k:-4;--d:0.24s">W</div>
      <div class="v-letter" style="--k:-3;--d:0.18s">Y</div>
      <div class="v-letter" style="--k:-2;--d:0.12s">E</div>
      <div class="v-letter" style="--k:-1;--d:0.06s">R</div>
      <div class="anim-d">D</div>
      <div class="anim-colin">COLIN</div>
      <div class="v-letter" style="--k:1;--d:0.06s">M</div>
      <div class="v-letter" style="--k:2;--d:0.12s">A</div>
      <div class="v-letter" style="--k:3;--d:0.18s">L</div>
      <div class="v-letter" style="--k:4;--d:0.24s">O</div>
      <div class="v-letter" style="--k:5;--d:0.30s">N</div>
      <div class="v-letter" style="--k:6;--d:0.36s">E</div>
      <div class="v-letter" style="--k:7;--d:0.42s">Y</div>
      <div class="anim-heart">♥</div>
    </div>
  </div>
  <script>
  (function () {
    const btn = document.getElementById('loveBtn');
    const flipper = document.getElementById('flipper');
    const word = document.querySelector('.word');
    let animRunning = false;

    // Size the box to the measured word so all faces match exactly.
    function sizeBox() {
      const r = word.getBoundingClientRect();
      flipper.style.setProperty('--bw', r.width + 'px');
      flipper.style.setProperty('--bh', r.height + 'px');
    }
    window.addEventListener('resize', sizeBox);
    sizeBox();

    // Trigger the flip (button, any click, or spacebar).
    function flip() {
      if (animRunning) return;
      if (flipper.classList.contains('flip')) return; // ignore mid-animation
      flipper.classList.add('flip');
    }
    btn.addEventListener('click', function (e) { e.stopPropagation(); flip(); });
    document.addEventListener('click', flip);
    document.addEventListener('keydown', function (e) {
      if (e.code === 'Space' || e.key === ' ') {
        e.preventDefault();
        flip();
      }
    });
    flipper.addEventListener('animationend', function (e) {
      if (e.target === flipper) flipper.classList.remove('flip'); // only the flip's own end
    });

    // Make the letters jump one by one, decaying to a settle.
    const jumpBtn = document.getElementById('jumpBtn');
    let jumpTimer = null;
    let jumping = false;
    function makeThemJump() {
      if (animRunning) return;
      if (jumping) return; // let the current bounce settle first
      jumping = true;
      word.classList.add('jump');
      clearTimeout(jumpTimer);
      // last tile starts at 0.4s, animation is 1s -> settle ~1.4s
      jumpTimer = setTimeout(function () {
        word.classList.remove('jump');
        jumping = false; // re-arm
      }, 1500);
    }
    jumpBtn.addEventListener('click', function (e) {
      e.stopPropagation(); // don't also trigger the flip
      makeThemJump();
    });

    // ---- Name cross animation ----
    const namesBtn = document.getElementById('namesBtn');
    const overlay = document.getElementById('animOverlay');
    const stage = document.getElementById('animStage');
    const heart = overlay.querySelector('.anim-heart');
    function measureAnim() {
      // Resolve var(--s) to px with a throwaway probe.
      const probe = document.createElement('div');
      probe.style.cssText = 'position:absolute;left:0;top:0;visibility:hidden;width:var(--s);height:0';
      overlay.appendChild(probe);
      const sPx = probe.getBoundingClientRect().width;
      probe.remove();
      // Zoom the cross so the 13-line vertical stack fits within ~90% of the viewport height.
      const zs = Math.min(0.4, (window.innerHeight * 0.9) / (13 * sPx));
      stage.style.setProperty('--zs', zs);
      const d = overlay.querySelector('.anim-d');
      const anais = overlay.querySelector('.anim-anais');
      const dr = d.getBoundingClientRect();
      const ar = anais.getBoundingClientRect();
      stage.style.setProperty('--dw', dr.width + 'px');
      stage.style.setProperty('--dh', dr.height + 'px');
      stage.style.setProperty('--anais-w', ar.width + 'px');
    }
    window.addEventListener('resize', measureAnim);
    window.addEventListener('load', measureAnim);
    measureAnim();

    const sleep = function (ms) { return new Promise(function (r) { setTimeout(r, ms); }); };
    async function playNames() {
      if (animRunning) return;
      animRunning = true;
      word.style.opacity = '0';        // hide real ANAÏS; overlay copy stands in
      overlay.classList.add('active');
      await sleep(250);
      overlay.classList.add('p1');     // zoom out + D COLIN fade in
      await sleep(1000);
      overlay.classList.add('p2');     // SAWYER / MALONEY fade in (cross)
      await sleep(800);
      await sleep(1000);               // hold a second
      overlay.classList.add('p3');     // D -> heart
      await sleep(450);
      heart.classList.add('pulse');    // heart pulses larger
      await sleep(1300);
      overlay.classList.add('p4');     // others fade out, ANAÏS zooms back
      heart.classList.remove('pulse');
      await sleep(1000);
      overlay.classList.remove('active');
      word.style.opacity = '';         // restore real ANAÏS
      await sleep(250);
      overlay.classList.remove('p1', 'p2', 'p3', 'p4');
      animRunning = false;
    }
    namesBtn.addEventListener('click', function (e) {
      e.stopPropagation();
      playNames();
    });
  })();
  </script>
</body>
</html>

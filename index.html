<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Anaïs</title>
<style>
  :root { --s: clamp(80px, 18vw, 220px); }
  html, body { height: 100%; margin: 0; }
  body {
    background: #f3f0e8; /* eggshell */
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
    font-family: "Helvetica Neue", "Arial Black", Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .word {
    display: flex;
    gap: 0.02em;
    perspective: 1200px;
    user-select: none;
  }

  /* Stable, non-rotating hit box. Sizes to the card it wraps.
     Carries the :hover so the flip target never changes mid-rotation. */
  .tile {
    position: relative;
    display: inline-flex;
  }

  .card {
    position: relative;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    height: 1em;
    font-size: var(--s);
    font-weight: 900;
    line-height: 1;
    color: #111;
    transform-style: preserve-3d;
    transition: transform 0.7s cubic-bezier(0.2, 0.8, 0.2, 1);
  }
  .tile:hover .card { transform: rotateY(180deg); }

  .face {
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
  }
  .front {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    height: 1em;
  }
  .back {
    position: absolute;
    inset: 0;
    transform: rotateY(180deg);
    overflow: hidden;
  }
  .back img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
</style>
</head>
<body>
  <div class="word">
    <div class="tile"><div class="card"><div class="face front">A</div><div class="face back"><img src="assets/images/a0386b7b-b1ea-49ac-8f8c-810d2b04c556.jpg" alt=""></div></div></div>
    <div class="tile"><div class="card"><div class="face front">N</div><div class="face back"><img src="assets/images/IMG_0772.jpg" alt=""></div></div></div>
    <div class="tile"><div class="card"><div class="face front">A</div><div class="face back"><img src="assets/images/IMG_1003.png" alt=""></div></div></div>
    <div class="tile"><div class="card"><div class="face front">Ï</div><div class="face back"><img src="assets/images/IMG_5316.jpg" alt=""></div></div></div>
    <div class="tile"><div class="card"><div class="face front">S</div><div class="face back"><img src="assets/images/IMG_6110.jpg" alt=""></div></div></div>
  </div>
</body>
</html>

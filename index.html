<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Anaïs</title>
<style>
  /* --s capped by viewport height so the word always fits vertically */
  :root {
    --s: min(clamp(70px, 16vw, 200px), 24vh);
    --d: clamp(12px, 2.2vw, 26px);   /* box depth (thin slab) */
    --bw: 60vw;                       /* measured by JS */
    --bh: var(--s);                   /* measured by JS */
  }
  html, body { height: 100%; margin: 0; }
  body {
    background: #f3f0e8; /* eggshell */
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
    font-family: "Helvetica Neue", "Arial Black", Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  /* 3D box that rotates about the horizontal (X) axis */
  .scene { perspective: 1600px; perspective-origin: 50% 50%; }
  .flipper {
    position: relative;
    width: var(--bw);
    height: var(--bh);
    transform-style: preserve-3d;
  }
  .flipper.flip {
    animation: flipx 3.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
  }
  @keyframes flipx {
    0%   { transform: rotateX(0deg); }
    45%  { transform: rotateX(180deg); }
    55%  { transform: rotateX(180deg); }
    100% { transform: rotateX(360deg); }
  }

  /* Box faces: centered in the box, then translated/rotated into place.
     Scoped to .boxface so they don't affect the per-letter .face elements. */
  .boxface {
    position: absolute;
    top: 50%; left: 50%;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
  }
  .boxface.front {
    width: var(--bw); height: var(--bh);
    margin: calc(var(--bh) / -2) 0 0 calc(var(--bw) / -2);
    transform: translateZ(calc(var(--d) / 2));
    display: flex; align-items: center; justify-content: center;
    /* flat: the whole face composites as one plane so it hides cleanly
       (backface-visibility) when the box flips, instead of the letter
       faces bleeding through. The per-letter flip still has 3D depth via
       .word's perspective + .card's preserve-3d. */
  }
  .boxface.back {
    width: var(--bw); height: var(--bh);
    margin: calc(var(--bh) / -2) 0 0 calc(var(--bw) / -2);
    transform: rotateX(180deg) translateZ(calc(var(--d) / 2));
    display: flex; align-items: center; justify-content: center;
    font-size: clamp(34px, 8.5vw, 104px);
    font-weight: 900;
    color: #111;
    white-space: nowrap;
  }
  .word {
    display: flex;
    gap: 0.02em;
    perspective: 1200px;
    user-select: none;
  }

  /* Stable, non-rotating hit box. Sizes to the card it wraps.
     Carries the :hover so the flip target never changes mid-rotation. */
  .tile {
    position: relative;
    display: inline-flex;
  }

  .card {
    position: relative;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    height: 1.12em;
    font-size: var(--s);
    font-weight: 900;
    line-height: 1;
    color: #111;
    transform-style: preserve-3d;
    transition: transform 0.7s cubic-bezier(0.2, 0.8, 0.2, 1);
  }
  .tile:hover .card { transform: rotateY(180deg); }

  /* Per-letter faces (original layout — NOT absolutely centered).
     Prefixed .l-front/.l-back so they don't collide with the box's
     .boxface.front / .boxface.back faces. */
  .face {
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
  }
  .l-front {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    height: 1.12em;
  }
  .l-back {
    position: absolute;
    inset: 0;
    transform: rotateY(180deg);
    overflow: hidden;
  }
  .l-back img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .love-btn {
    position: fixed;
    top: 20px; right: 20px;
    z-index: 200;
    font: 600 18px/1 "Helvetica Neue", Arial, sans-serif;
    color: #111;
    background: #f3f0e8;
    border: 1.5px solid #111;
    border-radius: 999px;
    padding: 10px 16px;
    cursor: pointer;
    transition: background 0.2s, color 0.2s, transform 0.15s;
  }
  .love-btn:hover { background: #111; color: #f3f0e8; }
  .love-btn:active { transform: scale(0.94); }

  .jump-btn {
    position: fixed;
    top: 20px; left: 20px;
    z-index: 200;
    font: 600 14px/1 "Helvetica Neue", Arial, sans-serif;
    color: #111;
    background: #f3f0e8;
    border: 1.5px solid #111;
    border-radius: 999px;
    padding: 10px 16px;
    cursor: pointer;
    transition: background 0.2s, color 0.2s, transform 0.15s;
  }
  .jump-btn:hover { background: #111; color: #f3f0e8; }
  .jump-btn:active { transform: scale(0.94); }

  /* One-by-one bounce: each letter leaps, decaying until it settles. */
  @keyframes jump {
    0%   { transform: translateY(0);      animation-timing-function: ease-out; }
    12%  { transform: translateY(-110%);  animation-timing-function: ease-in;  }
    24%  { transform: translateY(0);      animation-timing-function: ease-out; }
    36%  { transform: translateY(-60%);   animation-timing-function: ease-in;  }
    46%  { transform: translateY(0);      animation-timing-function: ease-out; }
    56%  { transform: translateY(-34%);   animation-timing-function: ease-in;  }
    64%  { transform: translateY(0);      animation-timing-function: ease-out; }
    72%  { transform: translateY(-19%);   animation-timing-function: ease-in;  }
    78%  { transform: translateY(0);      animation-timing-function: ease-out; }
    85%  { transform: translateY(-10%);   animation-timing-function: ease-in;  }
    90%  { transform: translateY(0);      animation-timing-function: ease-out; }
    100% { transform: translateY(0); }
  }
  .word.jump .tile { animation: jump 1s both; will-change: transform; }
  .word.jump .tile:nth-child(1) { animation-delay: 0s; }
  .word.jump .tile:nth-child(2) { animation-delay: 0.22s; }
  .word.jump .tile:nth-child(3) { animation-delay: 0.44s; }
  .word.jump .tile:nth-child(4) { animation-delay: 0.66s; }
  .word.jump .tile:nth-child(5) { animation-delay: 0.88s; }
</style>
</head>
<body>
  <button class="love-btn" id="loveBtn" title="Flip">♥</button>
  <button class="jump-btn" id="jumpBtn" title="Make them jump">make them jump</button>
  <div class="scene">
    <div class="flipper" id="flipper">
      <div class="boxface front">
        <div class="word">
          <div class="tile"><div class="card"><div class="face l-front">A</div><div class="face l-back"><img src="assets/images/a0386b7b-b1ea-49ac-8f8c-810d2b04c556.jpg" alt=""></div></div></div>
          <div class="tile"><div class="card"><div class="face l-front">N</div><div class="face l-back"><img src="assets/images/IMG_0772.jpg" alt=""></div></div></div>
          <div class="tile"><div class="card"><div class="face l-front">A</div><div class="face l-back"><img src="assets/images/IMG_1003.png" alt=""></div></div></div>
          <div class="tile"><div class="card"><div class="face l-front">Ï</div><div class="face l-back"><img src="assets/images/IMG_5316.jpg" alt=""></div></div></div>
          <div class="tile"><div class="card"><div class="face l-front">S</div><div class="face l-back"><img src="assets/images/IMG_6110.jpg" alt=""></div></div></div>
        </div>
      </div>
      <div class="boxface back">I love you</div>
    </div>
  </div>
  <script>
  (function () {
    const btn = document.getElementById('loveBtn');
    const flipper = document.getElementById('flipper');
    const word = document.querySelector('.word');

    // Size the box to the measured word so all faces match exactly.
    function sizeBox() {
      const r = word.getBoundingClientRect();
      flipper.style.setProperty('--bw', r.width + 'px');
      flipper.style.setProperty('--bh', r.height + 'px');
    }
    window.addEventListener('resize', sizeBox);
    sizeBox();

    // Trigger the flip (button, any click, or spacebar).
    function flip() {
      if (flipper.classList.contains('flip')) return; // ignore mid-animation
      flipper.classList.add('flip');
    }
    btn.addEventListener('click', function (e) { e.stopPropagation(); flip(); });
    document.addEventListener('click', flip);
    document.addEventListener('keydown', function (e) {
      if (e.code === 'Space' || e.key === ' ') {
        e.preventDefault();
        flip();
      }
    });
    flipper.addEventListener('animationend', function () {
      flipper.classList.remove('flip'); // reset so it can replay
    });

    // Make the letters jump one by one, decaying to a settle.
    const jumpBtn = document.getElementById('jumpBtn');
    const tiles = word.querySelectorAll('.tile');
    let jumpTimer = null;
    function makeThemJump() {
      // restart cleanly so it can be re-triggered
      word.classList.remove('jump');
      void word.offsetWidth; // force reflow
      word.classList.add('jump');
      clearTimeout(jumpTimer);
      // last tile starts at 0.88s, animation is 1s -> settle ~1.88s
      jumpTimer = setTimeout(function () { word.classList.remove('jump'); }, 2000);
    }
    jumpBtn.addEventListener('click', function (e) {
      e.stopPropagation(); // don't also trigger the flip
      makeThemJump();
    });
  })();
  </script>
</body>
</html>
